<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    body {
      margin: 0;
      width: 100%;
      min-height: 100dvh;

      font-family: sans-serif;
    }

    h1 {
      margin: 0;

      font-size: inherit;
      font-weight: inherit;
    }

    a {
      color: inherit;
      text-decoration: inherit;

      &:hover {
        text-decoration: underline;
      }

      ;
    }

    ul {
      margin: 0;
    }

    nav {
      display: flex;

      position: fixed;
      inset: 0;
      inset-block-end: auto;

      padding: 1rem;

      gap: 1rem;
      justify-content: space-between;
      align-items: center;

      color: white;
      background-color: red;

      & h1 {
        font-size: larger;

        pointer-events: none;
        user-select: none;
      }

      & ul {
        display: flex;

        padding: 0;

        gap: 1rem;

        &>li {
          display: inline-block;
        }
      }

      @media (max-width: 768px) {
        flex-direction: column;

        align-items: unset;

        & ul {
          flex-direction: column;
        }
      }
    }
  </style>
</head>

<body>
  <nav>
    <h1>Brand</h1>
    <ul>
      <li><a href="">Home</a></li>
      <li><a href="">Contact</a></li>
      <li><a href="">About Us</a></li>
    </ul>
  </nav>
</body>

</html>
