<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    body {
      margin: 0;
      width: 100%;
      min-height: 100dvh;

      font-family: sans-serif;
    }

    h1 {
      margin: 0;

      font-size: inherit;
      font-weight: inherit;
    }

    ul {
      margin: 0;
    }

    nav {
      position: fixed;
      inset: 0;
      inset-block-end: auto;

      padding-inline: 1rem;
      padding-block: .5rem;

      color: white;
      background-color: red;

      & ul {
        padding: 0;
      }

      & h1,
      ul,
      ul>li {
        display: inline-block;
      }

      & h1,
      ul>li {
        padding-inline: .5rem;
      }

      @media (max-width: 768px) {

        & h1,
        ul,
        ul>li {
          display: block;
        }

        & h1,
        ul>li {
          padding-inline: 0;
          padding-block: .5rem;
        }
      }
    }
  </style>
</head>

<body>
  <nav>
    <h1>Brand</h1>
    <ul>
      <li>Home</li>
      <li>Contact</li>
      <li>About Us</li>
    </ul>
  </nav>
</body>

</html>
