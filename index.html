<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    body {
      margin: 0;
      width: 100%;
      min-height: 100dvh;

      font-family: sans-serif;
    }

    h1 {
      margin: 0;

      font-size: inherit;
      font-weight: inherit;
    }

    ul {
      margin: 0;
    }

    nav {
      display: flex;
      
      position: fixed;
      inset: 0;
      inset-block-end: auto;

      padding-inline: 1rem;
      padding-block: .5rem;

      gap: 1rem;

      color: white;
      background-color: red;

      & ul {
        display: flex;

        padding: 0;

        gap: 1rem;

        & > li {
          display: inline-block;
        }
      }

      @media (max-width: 768px) {
        flex-direction: column;

        & ul {
          flex-direction: column;
        }
      }
    }
  </style>
</head>

<body>
  <nav>
    <h1>Brand</h1>
    <ul>
      <li>Home</li>
      <li>Contact</li>
      <li>About Us</li>
    </ul>
  </nav>
</body>

</html>
